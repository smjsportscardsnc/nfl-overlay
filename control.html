<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SMJ Overlay Control</title>
<style>
:root{
  --bg:#081221;
  --panel:#10203a;
  --panel2:#132847;
  --line:rgba(255,255,255,.12);
  --text:#f5f7fb;
  --muted:#b8c2d9;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#081221,#0d1b30);
  color:var(--text);
}
.wrap{max-width:1100px;margin:0 auto;padding:18px;}
h1{margin:0 0 14px;font-size:26px;}
.group{
  background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
label{
  display:block;
  font-size:12px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
  letter-spacing:1px;
}
.row{display:flex;gap:10px;flex-wrap:wrap;}
input,select,button{font:inherit;}
input,select{
  width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  color:var(--text);
  padding:12px;
  border-radius:12px;
  min-width:0;
}
button{
  border:0;
  border-radius:12px;
  padding:12px 14px;
  background:linear-gradient(90deg,#61b8ff,#1d58d8);
  color:#fff;
  font-weight:900;
  cursor:pointer;
}
button.secondary{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.08);
}
button.good{
  background:linear-gradient(90deg,#2bb673,#43d17a);
}
button.warn{
  background:linear-gradient(90deg,#ff6b6b,#ff8e53);
}
button.danger{
  background:linear-gradient(90deg,#c62828,#e53935);
}
.half{flex:1 1 280px}
.note{font-size:13px;color:var(--muted);line-height:1.45;}
.status{font-size:13px;color:var(--muted);margin-top:10px;}
.team-picker{
  display:grid;
  grid-template-columns:repeat(8,minmax(0,1fr));
  gap:8px;
}
.team-tile{
  position:relative;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
  border-radius:12px;
  padding:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:68px;
  cursor:pointer;
}
.team-tile.selected{
  border-color:#61b8ff;
  box-shadow:0 0 0 1px rgba(97,184,255,.5), 0 0 14px rgba(97,184,255,.2);
}
.team-tile.assigned{
  border-color:rgba(255,255,255,.18);
}
.team-tile img{
  width:42px;height:42px;object-fit:contain;
}
.team-tile .code{
  position:absolute;top:5px;left:7px;
  font-size:10px;font-weight:1000;letter-spacing:.4px;color:var(--muted);
}
.team-tile .buyer{
  position:absolute;bottom:4px;left:50%;
  transform:translateX(-50%);
  max-width:90%;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-size:10px;font-weight:1000;
  background:rgba(4,10,22,.9);
  padding:2px 6px;border-radius:999px;
}
.table{width:100%;border-collapse:collapse;font-size:14px;}
.table th,.table td{
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:8px 6px;text-align:left;
  vertical-align:middle;
}
.table th{color:var(--muted); font-size:12px; text-transform:uppercase;}
.small-btn{
  padding:8px 10px;
  font-size:12px;
  border-radius:10px;
}
.chaser-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.chaser-card{
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  border-radius:12px;
  padding:10px;
}
.chaser-title{
  font-size:13px;
  font-weight:1000;
  letter-spacing:.6px;
  margin-bottom:8px;
  color:#fff;
}
.chaser-actions{
  display:flex;
  gap:6px;
  margin-top:8px;
}
@media (max-width: 900px){
  .team-picker{grid-template-columns:repeat(4,minmax(0,1fr));}
  .chaser-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>SMJ Overlay Control</h1>

  <div class="group">
    <div class="note">Use this page on your tablet. It controls the overlay in OBS through Firebase.</div>
    <div class="status" id="connectionStatus">Not connected yet.</div>
    <div class="row" style="margin-top:12px;">
      <button class="danger" onclick="newBreak()">New Break</button>
    </div>
  </div>

  <div class="group">
    <label>Overlay Title</label>
    <div class="row">
      <input id="titleInput" class="half" placeholder="Break title">
      <button onclick="setTitle()">Set Title</button>
    </div>
  </div>

  <div class="group">
    <label>Custom Ticker</label>
    <div class="row">
      <input id="tickerInput" class="half" placeholder="Custom ticker text">
      <button onclick="setTicker()">Set Custom Ticker</button>
      <button class="secondary" onclick="toggleAssignmentTicker()">Use Assignment Ticker</button>
    </div>
  </div>

  <div class="group">
    <label>Click A Team To Select It</label>
    <div class="team-picker" id="teamPicker"></div>
    <div class="row" style="margin-top:10px;">
      <input id="buyerInput" class="half" placeholder="Whatnot username">
      <button class="good" onclick="assignBuyer()">Assign Selected Team</button>
      <button class="secondary" onclick="clearSelectedTeam()">Clear Selected Team</button>
    </div>
  </div>

  <div class="group">
    <label>Chaser Team Tracker</label>
    <div class="note" style="margin-bottom:10px;">Track your 9 chaser spots separately here. Picking a team here updates the overlay immediately.</div>
    <div class="chaser-grid" id="chaserGrid"></div>
  </div>

  <div class="group">
    <label>Assignments</label>
    <div style="overflow:auto">
      <table class="table">
        <thead>
          <tr><th>Team</th><th>Buyer</th><th>Base Cards</th><th>Actions</th></tr>
        </thead>
        <tbody id="assignmentsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const TEAM_DATA = [
  ['ari','ARI'],['atl','ATL'],['bal','BAL'],['buf','BUF'],['car','CAR'],['chi','CHI'],['cin','CIN'],['cle','CLE'],
  ['dal','DAL'],['den','DEN'],['det','DET'],['gb','GB'],['hou','HOU'],['ind','IND'],['jax','JAX'],['kc','KC'],
  ['lv','LV'],['lac','LAC'],['lar','LAR'],['mia','MIA'],['min','MIN'],['ne','NE'],['no','NO'],['nyg','NYG'],
  ['nyj','NYJ'],['phi','PHI'],['pit','PIT'],['sea','SEA'],['sf','SF'],['tb','TB'],['ten','TEN'],['was','WAS']
];

const firebaseConfig = {
  apiKey: "AIzaSyAP5JIYtql-4YB-wAgNT2Urja4DUOFoRws",
  authDomain: "smj-overlay.firebaseapp.com",
  databaseURL: "https://smj-overlay-default-rtdb.firebaseio.com",
  projectId: "smj-overlay",
  storageBucket: "smj-overlay.firebasestorage.app",
  messagingSenderId: "1034121319902",
  appId: "1:1034121319902:web:2b88ce1cc3ccf79766794f",
  measurementId: "G-511F87E4GE"
};

const STATE_PATH = "overlayState/main";
const defaults = {
  title: "NFL BREAK NIGHT",
  soldTeams: {},
  tickerMode: "default",
  defaultTicker: "Welcome to SMJ Sports Cards & Collectibles!",
  recapMode: false,
  chasers: {
    "1": { winner: "", team: "" },
    "2": { winner: "", team: "" },
    "3": { winner: "", team: "" },
    "4": { winner: "", team: "" },
    "5": { winner: "", team: "" },
    "6": { winner: "", team: "" },
    "7": { winner: "", team: "" },
    "8": { winner: "", team: "" },
    "9": { winner: "", team: "" }
  }
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let state = structuredClone(defaults);
let selectedTeam = "";

function renderInputs(){
  document.getElementById("titleInput").value = state.title || "";
  document.getElementById("tickerInput").value = state.defaultTicker || "";
}

function renderTeamPicker(){
  const picker = document.getElementById("teamPicker");
  picker.innerHTML = "";
  TEAM_DATA.forEach(([k,label]) => {
    const info = state.soldTeams?.[k];
    const buyer = !info ? "" : (typeof info === "string" ? info : info.buyer);

    const tile = document.createElement("button");
    tile.type = "button";
    tile.className = "team-tile" + (selectedTeam === k ? " selected" : "") + (info ? " assigned" : "");
    tile.onclick = () => {
      selectedTeam = k;
      renderTeamPicker();
    };

    const code = document.createElement("div");
    code.className = "code";
    code.textContent = label;

    const img = document.createElement("img");
    img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${k}.png`;
    img.alt = label;

    tile.appendChild(code);
    tile.appendChild(img);

    if(buyer){
      const buyerTag = document.createElement("div");
      buyerTag.className = "buyer";
      buyerTag.textContent = buyer;
      tile.appendChild(buyerTag);
    }

    picker.appendChild(tile);
  });
}

function renderAssignments(){
  const tbody = document.getElementById("assignmentsBody");
  tbody.innerHTML = "";
  TEAM_DATA.forEach(([k,label]) => {
    const info = state.soldTeams?.[k];
    if(!info) return;
    const buyer = typeof info === "string" ? info : info.buyer;
    const baseCards = typeof info === "string" ? "No" : info.baseCards;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${label}</td>
      <td>${buyer}</td>
      <td>${baseCards}</td>
      <td><button class="small-btn secondary" onclick="removeTeam('${k}')">Remove</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function renderChasers(){
  const grid = document.getElementById("chaserGrid");
  grid.innerHTML = "";
  for(let i=1;i<=9;i++){
    const spot = String(i);
    const info = state.chasers?.[spot] || { winner:"", team:"" };

    const card = document.createElement("div");
    card.className = "chaser-card";

    const title = document.createElement("div");
    title.className = "chaser-title";
    title.textContent = `Chaser ${spot}`;

    const winnerLabel = document.createElement("label");
    winnerLabel.textContent = "Winner";
    const winnerInput = document.createElement("input");
    winnerInput.value = info.winner || "";
    winnerInput.placeholder = "Winner username";
    winnerInput.onchange = () => saveChaserField(spot, "winner", winnerInput.value);

    const teamLabel = document.createElement("label");
    teamLabel.textContent = "Team";
    const teamSelect = document.createElement("select");

    const blank = document.createElement("option");
    blank.value = "";
    blank.textContent = "Select team";
    teamSelect.appendChild(blank);

    TEAM_DATA.forEach(([key,label]) => {
      const opt = document.createElement("option");
      opt.value = label;
      opt.textContent = label;
      if(info.team === label) opt.selected = true;
      teamSelect.appendChild(opt);
    });
    teamSelect.onchange = () => saveChaserField(spot, "team", teamSelect.value);

    const actions = document.createElement("div");
    actions.className = "chaser-actions";

    const assignSelectedBtn = document.createElement("button");
    assignSelectedBtn.className = "small-btn secondary";
    assignSelectedBtn.textContent = "Use Selected Team";
    assignSelectedBtn.onclick = () => {
      if(!selectedTeam) return;
      const selectedLabel = TEAM_DATA.find(([k]) => k === selectedTeam)?.[1] || "";
      teamSelect.value = selectedLabel;
      saveChaserField(spot, "team", selectedLabel);
    };

    const clearBtn = document.createElement("button");
    clearBtn.className = "small-btn warn";
    clearBtn.textContent = "Clear";
    clearBtn.onclick = () => clearChaser(spot);

    actions.appendChild(assignSelectedBtn);
    actions.appendChild(clearBtn);

    card.appendChild(title);
    card.appendChild(winnerLabel);
    card.appendChild(winnerInput);
    card.appendChild(teamLabel);
    card.appendChild(teamSelect);
    card.appendChild(actions);
    grid.appendChild(card);
  }
}

async function saveChaserField(spot, field, value){
  const nextChasers = { ...(state.chasers || {}) };
  nextChasers[spot] = {
    winner: nextChasers[spot]?.winner || "",
    team: nextChasers[spot]?.team || "",
    [field]: value
  };
  await update(ref(db, STATE_PATH), { chasers: nextChasers });
}

window.clearChaser = async function(spot){
  const nextChasers = { ...(state.chasers || {}) };
  nextChasers[spot] = { winner: "", team: "" };
  await update(ref(db, STATE_PATH), { chasers: nextChasers });
};

window.setTitle = async function(){
  const v = document.getElementById("titleInput").value.trim();
  if(!v) return;
  await update(ref(db, STATE_PATH), { title: v.toUpperCase() });
};

window.setTicker = async function(){
  const v = document.getElementById("tickerInput").value.trim();
  await update(ref(db, STATE_PATH), { defaultTicker: v || defaults.defaultTicker, tickerMode: "default" });
};

window.toggleAssignmentTicker = async function(){
  await update(ref(db, STATE_PATH), { tickerMode: "assignments" });
};

window.assignBuyer = async function(){
  const team = selectedTeam;
  const buyer = document.getElementById("buyerInput").value.trim();
  if(!team || !buyer) return;
  const nextSold = { ...(state.soldTeams || {}) };
  nextSold[team] = { buyer, baseCards: "No" };
  await update(ref(db, STATE_PATH), { soldTeams: nextSold });
  document.getElementById("buyerInput").value = "";
};

window.clearSelectedTeam = async function(){
  const team = selectedTeam;
  if(!team) return;
  const nextSold = { ...(state.soldTeams || {}) };
  delete nextSold[team];
  await update(ref(db, STATE_PATH), { soldTeams: nextSold });
};

window.removeTeam = async function(team){
  const nextSold = { ...(state.soldTeams || {}) };
  delete nextSold[team];
  await update(ref(db, STATE_PATH), { soldTeams: nextSold });
};

window.newBreak = async function(){
  const confirmed = window.confirm("Start a new break? This will clear all teams, chasers, ticker mode, and reset the overlay.");
  if(!confirmed) return;

  selectedTeam = "";
  document.getElementById("buyerInput").value = "";

  await set(ref(db, STATE_PATH), structuredClone(defaults));
};

const stateRef = ref(db, STATE_PATH);
onValue(stateRef, async (snap) => {
  const val = snap.val();
  if (val === null) {
    await set(stateRef, defaults);
    return;
  }
  state = { ...defaults, ...val };
  document.getElementById("connectionStatus").textContent = "Connected.";
  renderInputs();
  renderTeamPicker();
  renderAssignments();
  renderChasers();
}, () => {
  document.getElementById("connectionStatus").textContent = "Connection error.";
});
</script>
</body>
</html>
