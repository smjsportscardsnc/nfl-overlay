
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SMJ Overlay Control</title>
<style>
:root{
  --bg:#081221;
  --panel:#10203a;
  --panel2:#132847;
  --line:rgba(255,255,255,.12);
  --text:#f5f7fb;
  --muted:#b8c2d9;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Montserrat,Arial,sans-serif;
  background:linear-gradient(180deg,#081221,#0d1b30);
  color:var(--text);
}
.wrap{max-width:980px;margin:0 auto;padding:18px;}
h1{margin:0 0 14px;font-size:26px;}
.group{
  background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
label{
  display:block;
  font-size:12px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
  letter-spacing:1px;
}
.row{display:flex;gap:10px;flex-wrap:wrap;}
input,select,button,textarea{font:inherit;}
input,select,textarea{
  width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  color:var(--text);
  padding:12px;
  border-radius:12px;
  min-width:0;
}
button{
  border:0;
  border-radius:12px;
  padding:12px 14px;
  background:linear-gradient(90deg,#61b8ff,#1d58d8);
  color:#fff;
  font-weight:900;
  cursor:pointer;
}
button.secondary{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.08);
}
button.good{
  background:linear-gradient(90deg,#2bb673,#43d17a);
}
button.warn{
  background:linear-gradient(90deg,#ff6b6b,#ff8e53);
}
button.pass{
  background:linear-gradient(90deg,#ff6464,#d91f35);
}
button.base-yes{
  background:linear-gradient(90deg,#2bb673,#43d17a);
}
button.base-no{
  background:linear-gradient(90deg,#ff6b6b,#ff8e53);
}
.half{flex:1 1 280px}
.third{flex:1 1 180px}
.note{font-size:13px;color:var(--muted);line-height:1.45;}
.status{font-size:13px;color:var(--muted);margin-top:10px;}
.table{width:100%;border-collapse:collapse;font-size:14px;}
.table th,.table td{
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:8px 6px;text-align:left;
  vertical-align:middle;
}
.table th{color:var(--muted); font-size:12px; text-transform:uppercase;}
.small-btn{
  padding:8px 10px;
  font-size:12px;
  border-radius:10px;
}
.actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>SMJ Overlay Control</h1>

  <div class="group">
    <div class="note">Use this page on your tablet. It controls the overlay in OBS through Firebase.</div>
    <div class="status" id="connectionStatus">Not connected yet.</div>
  </div>

  <div class="group">
    <label>Overlay Title</label>
    <div class="row">
      <input id="titleInput" class="half" placeholder="NFL Break Night">
      <button onclick="setTitle()">Set Title</button>
    </div>
  </div>

  <div class="group">
    <label>Assign Buyer</label>
    <div class="row">
      <select id="teamDropdown" class="third"></select>
      <input id="buyerInput" class="third" placeholder="Whatnot username">
    </div>
    <div class="row" style="margin-top:10px;">
      <button class="good half" onclick="assignBuyer()">Assign Team</button>
      <button class="secondary half" onclick="clearSelectedTeam()">Clear Selected Team</button>
    </div>
    <div class="note" style="margin-top:10px;">Base cards default to <strong>Yes</strong> when assigned. You can change them later in the table below.</div>
  </div>

  <div class="group">
    <label>Ticker</label>
    <div class="row">
      <input id="tickerInput" class="half" placeholder="Custom ticker text">
      <button onclick="setTicker()">Set Custom</button>
      <button class="secondary" onclick="toggleAssignmentTicker()">Toggle Assignment Ticker</button>
    </div>
  </div>

  <div class="group">
    <label>Video Splash Buttons</label>
    <div class="row">
      <button class="pass third" onclick="triggerSplash('stash')">Play Stash or Pass</button>
      <button class="third" onclick="triggerSplash('spin')">Play Spin 2 Choose 1</button>
      <button class="warn third" onclick="clearSplash()">Clear Splash</button>
    </div>
  </div>

  <div class="group">
    <label>Break Reset</label>
    <div class="row">
      <button class="warn half" onclick="clearOverlayForNewBreak()">Clear Overlay For New Break</button>
    </div>
  </div>

  <div class="group">
    <label>Assignments</label>
    <div style="overflow:auto">
      <table class="table">
        <thead>
          <tr><th>Team</th><th>Buyer</th><th>Base Cards</th><th>Actions</th></tr>
        </thead>
        <tbody id="assignmentsBody"></tbody>
      </table>
    </div>
    <div class="row" style="margin-top:10px;">
      <button class="good half" onclick="downloadAssignmentsXLSX()">Download Assignment XLSX</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import * as XLSX from "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm";

const TEAM_DATA = [
  ['ari','ARI'],['atl','ATL'],['bal','BAL'],['buf','BUF'],['car','CAR'],['chi','CHI'],['cin','CIN'],['cle','CLE'],
  ['dal','DAL'],['den','DEN'],['det','DET'],['gb','GB'],['hou','HOU'],['ind','IND'],['jax','JAX'],['kc','KC'],
  ['lv','LV'],['lac','LAC'],['lar','LAR'],['mia','MIA'],['min','MIN'],['ne','NE'],['no','NO'],['nyg','NYG'],
  ['nyj','NYJ'],['phi','PHI'],['pit','PIT'],['sea','SEA'],['sf','SF'],['tb','TB'],['ten','TEN'],['was','WAS']
];

const firebaseConfig = {
  apiKey: "AIzaSyAP5JIYtql-4YB-wAgNT2Urja4DUOFoRws",
  authDomain: "smj-overlay.firebaseapp.com",
  databaseURL: "https://smj-overlay-default-rtdb.firebaseio.com",
  projectId: "smj-overlay",
  storageBucket: "smj-overlay.firebasestorage.app",
  messagingSenderId: "1034121319902",
  appId: "1:1034121319902:web:2b88ce1cc3ccf79766794f",
  measurementId: "G-511F87E4GE"
};

const STATE_PATH = "overlayState/main";
const defaults = {
  title: "NFL BREAK NIGHT",
  soldTeams: {},
  tickerMode: "assignments",
  defaultTicker: "Welcome to SMJ Sports Cards & Collectibles!",
  activeSplash: ""
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let state = structuredClone(defaults);

function safeTitleFile(){
  return (state.title || "break")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_|_$/g,"");
}

function populateDropdown(){
  const dd = document.getElementById("teamDropdown");
  dd.innerHTML = "";
  TEAM_DATA.forEach(([k,label]) => {
    const opt = document.createElement("option");
    opt.value = k;
    opt.textContent = label;
    dd.appendChild(opt);
  });
}

function renderInputs(){
  document.getElementById("titleInput").value = state.title || "";
}

function renderAssignments(){
  const tbody = document.getElementById("assignmentsBody");
  tbody.innerHTML = "";
  TEAM_DATA.forEach(([k,label]) => {
    const info = state.soldTeams?.[k];
    if(!info) return;
    const buyer = typeof info === "string" ? info : info.buyer;
    const baseCards = typeof info === "string" ? "Yes" : info.baseCards;

    const tr = document.createElement("tr");

    const teamTd = document.createElement("td");
    teamTd.textContent = label;

    const buyerTd = document.createElement("td");
    buyerTd.textContent = buyer;

    const baseTd = document.createElement("td");
    const baseBtn = document.createElement("button");
    baseBtn.className = "small-btn " + (baseCards === "Yes" ? "base-yes" : "base-no");
    baseBtn.textContent = baseCards;
    baseBtn.onclick = () => toggleBase(k);
    baseTd.appendChild(baseBtn);

    const actionsTd = document.createElement("td");
    const actions = document.createElement("div");
    actions.className = "actions";

    const removeBtn = document.createElement("button");
    removeBtn.className = "small-btn secondary";
    removeBtn.textContent = "Remove";
    removeBtn.onclick = () => removeTeam(k);

    actions.appendChild(removeBtn);
    actionsTd.appendChild(actions);

    tr.appendChild(teamTd);
    tr.appendChild(buyerTd);
    tr.appendChild(baseTd);
    tr.appendChild(actionsTd);
    tbody.appendChild(tr);
  });
}

window.setTitle = async function(){
  const v = document.getElementById("titleInput").value.trim();
  if(!v) return;
  await update(ref(db, STATE_PATH), { title: v.toUpperCase() });
};

window.assignBuyer = async function(){
  const team = document.getElementById("teamDropdown").value;
  const buyer = document.getElementById("buyerInput").value.trim();
  if(!buyer) return;
  const nextSold = { ...(state.soldTeams || {}) };
  nextSold[team] = { buyer, baseCards: "Yes" };
  await update(ref(db, STATE_PATH), { soldTeams: nextSold });
  document.getElementById("buyerInput").value = "";
};

window.clearSelectedTeam = async function(){
  const team = document.getElementById("teamDropdown").value;
  const nextSold = { ...(state.soldTeams || {}) };
  delete nextSold[team];
  await update(ref(db, STATE_PATH), { soldTeams: nextSold });
};

window.toggleBase = async function(team){
  const nextSold = { ...(state.soldTeams || {}) };
  const info = nextSold[team];
  if(!info) return;

  if(typeof info === "string"){
    nextSold[team] = { buyer: info, baseCards: "No" };
  } else {
    nextSold[team] = {
      ...info,
      baseCards: info.baseCards === "Yes" ? "No" : "Yes"
    };
  }

  await update(ref(db, STATE_PATH), { soldTeams: nextSold });
};

window.removeTeam = async function(team){
  const nextSold = { ...(state.soldTeams || {}) };
  delete nextSold[team];
  await update(ref(db, STATE_PATH), { soldTeams: nextSold });
};

window.setTicker = async function(){
  const v = document.getElementById("tickerInput").value.trim();
  if(!v) return;
  await update(ref(db, STATE_PATH), { defaultTicker: v, tickerMode: "default" });
};

window.toggleAssignmentTicker = async function(){
  const nextMode = state.tickerMode === "assignments" ? "default" : "assignments";
  await update(ref(db, STATE_PATH), { tickerMode: nextMode });
};

window.triggerSplash = async function(type){
  await update(ref(db, STATE_PATH), { activeSplash: type });
};

window.clearSplash = async function(){
  await update(ref(db, STATE_PATH), { activeSplash: "" });
};

window.clearOverlayForNewBreak = async function(){
  const keepTitle = document.getElementById("titleInput").value.trim() || "NFL BREAK NIGHT";
  await set(ref(db, STATE_PATH), {
    ...defaults,
    title: keepTitle.toUpperCase()
  });
  document.getElementById("buyerInput").value = "";
  document.getElementById("tickerInput").value = "";
};

window.downloadAssignmentsXLSX = function(){
  const rows = [];
  rows.push([state.title || "BREAK"]);
  rows.push([]);
  rows.push(["Team","Buyer Username","Wants Base Cards"]);
  TEAM_DATA.forEach(([k,label]) => {
    const info = state.soldTeams?.[k];
    if(!info) return;
    const buyer = typeof info === "string" ? info : info.buyer;
    const baseCards = typeof info === "string" ? "Yes" : info.baseCards;
    rows.push([label, buyer, baseCards]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Assignments");
  XLSX.writeFile(wb, `${safeTitleFile()}_assignments.xlsx`);
};

const stateRef = ref(db, STATE_PATH);
onValue(stateRef, async (snap) => {
  const val = snap.val();
  if (val === null) {
    await set(stateRef, defaults);
    return;
  }
  state = { ...defaults, ...val };
  document.getElementById("connectionStatus").textContent = "Connected.";
  renderInputs();
  renderAssignments();
  populateDropdown();
}, () => {
  document.getElementById("connectionStatus").textContent = "Connection error.";
});

populateDropdown();
</script>
</body>
</html>
