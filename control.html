<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SMJ Overlay Control</title>

<style>
:root{
  --bg:#081221;
  --panel:#10203a;
  --panel2:#132847;
  --line:rgba(255,255,255,.12);
  --text:#f5f7fb;
  --muted:#b8c2d9;
}
body{
  margin:0;
  font-family:Montserrat,Arial,sans-serif;
  background:linear-gradient(180deg,#081221,#0d1b30);
  color:var(--text);
}
.wrap{max-width:900px;margin:0 auto;padding:18px;}
.group{
  background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
.row{display:flex;gap:10px;flex-wrap:wrap;}
input,select,button{
  font:inherit;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
}
input,select{background:rgba(255,255,255,.06);color:white;width:100%;}
button{
  background:linear-gradient(90deg,#61b8ff,#1d58d8);
  border:0;
  color:white;
  font-weight:900;
  cursor:pointer;
}
.status{font-size:14px;margin-top:8px;}
</style>
</head>

<body>
<div class="wrap">

<h2>SMJ Overlay Control</h2>

<div class="group">
<div id="connectionStatus" class="status">Not connected yet.</div>
</div>

<div class="group">
<label>Overlay Title</label>
<div class="row">
<input id="titleInput" placeholder="NFL Break Night">
<button onclick="setTitle()">Set Title</button>
</div>
</div>

<div class="group">
<label>Assign Buyer</label>
<div class="row">
<select id="teamDropdown"></select>
<input id="buyerInput" placeholder="Buyer name">
<button onclick="assignBuyer()">Assign</button>
</div>
</div>

</div>

<script type="module">

/* ✅ Firebase imports (CORRECT) */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

/* ✅ TEAM LIST */
const TEAM_DATA = [
['ari','ARI'],['atl','ATL'],['bal','BAL'],['buf','BUF'],['car','CAR'],['chi','CHI'],['cin','CIN'],['cle','CLE'],
['dal','DAL'],['den','DEN'],['det','DET'],['gb','GB'],['hou','HOU'],['ind','IND'],['jax','JAX'],['kc','KC'],
['lv','LV'],['lac','LAC'],['lar','LAR'],['mia','MIA'],['min','MIN'],['ne','NE'],['no','NO'],['nyg','NYG'],
['nyj','NYJ'],['phi','PHI'],['pit','PIT'],['sea','SEA'],['sf','SF'],['tb','TB'],['ten','TEN'],['was','WAS']
];

/* ✅ YOUR CLEAN CONFIG (FIXED) */
const firebaseConfig = {
  apiKey: "AIzaSyAP5JIYtql-4YB-wAgNT2Urja4DUOFoRws",
  authDomain: "smj-overlay.firebaseapp.com",
  databaseURL: "https://smj-overlay-default-rtdb.firebaseio.com",
  projectId: "smj-overlay",
  storageBucket: "smj-overlay.firebasestorage.app",
  messagingSenderId: "1034121319902",
  appId: "1:1034121319902:web:2b88ce1cc3ccf79766794f"
};

const STATE_PATH = "overlayState/main";

/* ✅ INIT */
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const stateRef = ref(db, STATE_PATH);

/* Populate dropdown */
const dd = document.getElementById("teamDropdown");
TEAM_DATA.forEach(([k,label])=>{
  const opt=document.createElement("option");
  opt.value=k;
  opt.textContent=label;
  dd.appendChild(opt);
});

/* Connection listener */
onValue(stateRef,(snap)=>{
  document.getElementById("connectionStatus").innerText="Connected.";
});

/* Controls */

window.setTitle=async function(){
  const v=document.getElementById("titleInput").value.trim();
  if(!v)return;
  await update(stateRef,{title:v.toUpperCase()});
}

window.assignBuyer=async function(){
  const team=dd.value;
  const buyer=document.getElementById("buyerInput").value.trim();
  if(!buyer)return;
  const updateObj={};
  updateObj[`soldTeams/${team}`]={buyer};
  await update(stateRef,updateObj);
}

</script>
</body>
</html>
