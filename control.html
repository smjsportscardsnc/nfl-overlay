<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMJ Overlay Control</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#081221;
  color:white;
}
.wrap {
  max-width:1000px;
  margin:auto;
  padding:16px;
}
h1 { margin-bottom:10px; }

.group {
  background:#132847;
  padding:14px;
  border-radius:12px;
  margin-bottom:14px;
}

input, button {
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#1d58d8;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button.good { background:#2bb673; }
button.warn { background:#ff6b6b; }

.team-grid {
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:8px;
}

.team {
  background:#1a335a;
  border-radius:10px;
  padding:8px;
  text-align:center;
  cursor:pointer;
  position:relative;
}

.team.selected { outline:2px solid #61b8ff; }

.team img {
  width:40px;
}

.team span {
  display:block;
  font-size:10px;
}

.table {
  width:100%;
  border-collapse:collapse;
}

.table td {
  padding:6px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>
<div class="wrap">

<h1>SMJ Overlay Control</h1>

<div class="group">
  <div id="status">Connecting...</div>
</div>

<div class="group">
  <input id="titleInput" placeholder="Break Title">
  <button onclick="setTitle()">Set Title</button>
</div>

<div class="group">
  <div class="team-grid" id="teams"></div>

  <input id="buyerInput" placeholder="Buyer username">
  <button class="good" onclick="assignTeam()">Assign</button>
  <button onclick="clearTeam()">Clear</button>
</div>

<div class="group">
  <button onclick="toggleRecap()">Toggle Recap Mode</button>
  <button onclick="setAllBase('Yes')">All Base YES</button>
  <button onclick="setAllBase('No')">All Base NO</button>
</div>

<div class="group">
  <button class="warn" onclick="resetAll()">New Break Reset</button>
</div>

<div class="group">
  <table class="table">
    <tbody id="table"></tbody>
  </table>

  <button class="good" onclick="downloadXLS()">Download XLSX</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import * as XLSX from "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm";

const config = {
  apiKey: "AIzaSyAP5JIYtql-4YB-wAgNT2Urja4DUOFoRws",
  authDomain: "smj-overlay.firebaseapp.com",
  databaseURL: "https://smj-overlay-default-rtdb.firebaseio.com",
  projectId: "smj-overlay",
  storageBucket: "smj-overlay.firebasestorage.app",
  messagingSenderId: "1034121319902",
  appId: "1:1034121319902:web:2b88ce1cc3ccf79766794f",
  measurementId: "G-511F87E4GE"
};

const app = initializeApp(config);
const db = getDatabase(app);

const PATH = "overlayState/main";

const TEAMS = [
['ari','ARI'],['atl','ATL'],['bal','BAL'],['buf','BUF'],['car','CAR'],['chi','CHI'],['cin','CIN'],['cle','CLE'],
['dal','DAL'],['den','DEN'],['det','DET'],['gb','GB'],['hou','HOU'],['ind','IND'],['jax','JAX'],['kc','KC'],
['lv','LV'],['lac','LAC'],['lar','LAR'],['mia','MIA'],['min','MIN'],['ne','NE'],['no','NO'],['nyg','NYG'],
['nyj','NYJ'],['phi','PHI'],['pit','PIT'],['sea','SEA'],['sf','SF'],['tb','TB'],['ten','TEN'],['was','WAS']
];

let state = { soldTeams:{} };
let selected = null;

/* ---------- UI ---------- */

function renderTeams(){
  const el = document.getElementById("teams");
  el.innerHTML = "";

  TEAMS.forEach(([k,label])=>{
    const t = document.createElement("div");
    t.className = "team" + (selected===k?" selected":"");

    const img = document.createElement("img");
    img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${k}.png`;

    const txt = document.createElement("span");
    txt.innerText = label;

    t.appendChild(img);
    t.appendChild(txt);

    t.onclick = ()=>{
      selected = k;
      renderTeams();
    };

    el.appendChild(t);
  });
}

function renderTable(){
  const tb = document.getElementById("table");
  tb.innerHTML="";

  Object.entries(state.soldTeams || {}).forEach(([k,v])=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${k.toUpperCase()}</td>
      <td>${v.buyer}</td>
      <td>${v.baseCards}</td>
    `;

    tb.appendChild(tr);
  });
}

/* ---------- ACTIONS ---------- */

window.setTitle = async ()=>{
  const v = document.getElementById("titleInput").value;
  await update(ref(db, PATH), { title:v });
};

window.assignTeam = async ()=>{
  const buyer = document.getElementById("buyerInput").value;
  if(!selected || !buyer) return;

  const next = {...state.soldTeams};
  next[selected] = { buyer, baseCards:"No" };

  await update(ref(db, PATH), { soldTeams:next });
};

window.clearTeam = async ()=>{
  if(!selected) return;

  const next = {...state.soldTeams};
  delete next[selected];

  await update(ref(db, PATH), { soldTeams:next });
};

window.toggleRecap = async ()=>{
  await update(ref(db, PATH), { recapMode: !state.recapMode });
};

window.setAllBase = async (val)=>{
  const next = {...state.soldTeams};

  Object.keys(next).forEach(k=>{
    next[k].baseCards = val;
  });

  await update(ref(db, PATH), { soldTeams:next });
};

window.resetAll = async ()=>{
  await set(ref(db, PATH), {
    title:"NEW BREAK",
    soldTeams:{},
    recapMode:false
  });
};

window.downloadXLS = ()=>{
  const rows = [];

  rows.push([state.title || "BREAK"]);
  rows.push([]);
  rows.push(["Team","Buyer","Base"]);

  Object.entries(state.soldTeams).forEach(([k,v])=>{
    rows.push([k.toUpperCase(), v.buyer, v.baseCards]);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Break");

  XLSX.writeFile(wb, "break.xlsx");
};

/* ---------- FIREBASE ---------- */

onValue(ref(db, PATH), snap=>{
  state = snap.val() || { soldTeams:{} };

  document.getElementById("status").innerText = "Connected";

  renderTeams();
  renderTable();
});
</script>
</body>
</html>
