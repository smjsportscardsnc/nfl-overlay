
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1.0" />
<title>SMJ NFL Break Overlay</title>

<style>
:root{
  --bg1: rgba(5,10,22,.95);
  --bg2: rgba(7,18,38,.92);
  --line: rgba(255,255,255,.12);
  --text:#f5f7fb;
  --muted:#b8c2d9;
}

html,body{
  margin:0;
  padding:0;
  width:1920px;
  height:360px;
  overflow:hidden;
  font-family:Montserrat,Arial,sans-serif;
  color:var(--text);
  background:transparent;
}

.overlay{
  width:1920px;
  height:360px;
  display:grid;
  grid-template-rows:80px 1fr 40px;
  gap:10px;
  padding:10px;
  box-sizing:border-box;
  position:relative;
}

.panel{
  background:linear-gradient(180deg,var(--bg2),var(--bg1));
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
}

.header{
  display:grid;
  grid-template-columns:70px 1fr 180px;
  align-items:center;
  padding:8px 16px;
  box-sizing:border-box;
}

.brand-logo{
  width:50px;
  height:50px;
}
.brand-logo img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

#title{
  font-size:26px;
  font-weight:900;
  text-align:center;
  letter-spacing:.5px;
  width:100%;
}

.header-right{
  text-align:right;
  color:var(--muted);
  font-size:14px;
}
.header-right strong{ color:var(--text); }

.teams-grid{
  display:grid;
  grid-template-columns:repeat(16,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:6px;
  padding:10px;
  box-sizing:border-box;
}

.team-chip{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;
  user-select:none;
}

.team-chip img{
  width:74%;
  height:74%;
  object-fit:contain;
  display:block;
}

.team-chip.sold img{
  filter:grayscale(100%) brightness(45%);
  opacity:.72;
}

.team-chip.sold::after{
  content:"✕";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-54%);
  font-size:42px;
  font-weight:900;
  color:rgba(255,0,0,.9);
  text-shadow:0 0 8px rgba(255,0,0,.8);
  pointer-events:none;
}

.team-initials{
  position:absolute;
  bottom:3px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  font-weight:800;
  letter-spacing:.4px;
  color:var(--text);
  background:rgba(4,10,22,.85);
  border:1px solid rgba(255,255,255,.1);
  border-radius:999px;
  padding:1px 6px;
  max-width:90%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.ticker{
  display:flex;
  align-items:center;
  overflow:hidden;
  padding:6px 12px;
  box-sizing:border-box;
}

#tickerText{
  white-space:nowrap;
  padding-left:100%;
  animation:ticker 22s linear infinite;
  font-size:18px;
  font-weight:700;
}

@keyframes ticker{
  from{transform:translateX(0)}
  to{transform:translateX(-100%)}
}

.controls{
  position:absolute;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  width:820px;
  max-height:330px;
  overflow:auto;
  z-index:999;
  background:rgba(4,10,22,.98);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  box-shadow:0 22px 50px rgba(0,0,0,.5);
  padding:16px;
  display:none;
  box-sizing:border-box;
}
.controls.show{display:block;}
.controls h3{
  margin:0 0 10px;
  font-size:20px;
  font-weight:900;
}

.control-group{
  margin-bottom:14px;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.07);
}
.control-group label{
  display:block;
  margin-bottom:7px;
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
}
.row{display:flex;gap:8px;flex-wrap:wrap;}

select,input,button{font:inherit;}

select,input{
  width:100%;
  border:1px solid rgba(255,255,255,.11);
  background:rgba(255,255,255,.06);
  color:var(--text);
  border-radius:12px;
  padding:10px 12px;
}

button{
  border:0;
  border-radius:12px;
  padding:10px 14px;
  color:white;
  cursor:pointer;
  background:linear-gradient(90deg,#61b8ff,#1d58d8);
  font-weight:800;
}
button.secondary{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.08);
}
.half{flex:1 1 0; min-width:0;}
</style>
</head>

<body>
<div class="overlay">

  <div class="panel header">
    <div class="brand-logo">
      <img src="Logo Master.png" alt="SMJ Logo">
    </div>

    <div id="title">NFL BREAK NIGHT</div>

    <div class="header-right">
      <div><strong id="soldCount">0</strong>/32 SOLD</div>
    </div>
  </div>

  <div class="panel teams-grid" id="teamsGrid"></div>

  <div class="panel ticker">
    <div id="tickerText">Click teams in OBS Interact mode to mark sold • hover shows buyer • press H for controls •</div>
  </div>

  <div class="controls" id="controls">
    <h3>Overlay Controls</h3>

    <div class="control-group">
      <label>Overlay Title</label>
      <div class="row">
        <input id="titleInput" class="half" placeholder="NFL Break Night">
        <button onclick="setTitle()">Set Title</button>
      </div>
    </div>

    <div class="control-group">
      <label>Assign Buyer</label>
      <div class="row">
        <select id="teamDropdown"></select>
        <input id="buyerInput" placeholder="Buyer name">
        <button onclick="assignBuyer()">Assign</button>
      </div>
    </div>

    <div class="control-group">
      <label>Ticker</label>
      <div class="row">
        <input id="tickerInput" class="half" placeholder="Custom ticker text">
        <button onclick="setTicker()">Set Text</button>
        <button class="secondary" onclick="toggleAssignmentTicker()">Toggle Team Assignments</button>
      </div>
    </div>
  </div>

</div>

<script>
const TEAM_DATA = [
  ['ari','ARI'],['atl','ATL'],['bal','BAL'],['buf','BUF'],['car','CAR'],['chi','CHI'],['cin','CIN'],['cle','CLE'],
  ['dal','DAL'],['den','DEN'],['det','DET'],['gb','GB'],['hou','HOU'],['ind','IND'],['jax','JAX'],['kc','KC'],
  ['lv','LV'],['lac','LAC'],['lar','LAR'],['mia','MIA'],['min','MIN'],['ne','NE'],['no','NO'],['nyg','NYG'],
  ['nyj','NYJ'],['phi','PHI'],['pit','PIT'],['sea','SEA'],['sf','SF'],['tb','TB'],['ten','TEN'],['was','WAS']
];

let state = {
  title: "NFL BREAK NIGHT",
  soldTeams: {},
  tickerMode: "default",
  defaultTicker: "Click teams in OBS Interact mode to mark sold • hover shows buyer • press H for controls •"
};

function saveState(){
  localStorage.setItem('smj_nfl_overlay_state_v16', JSON.stringify(state));
}
function loadState(){
  const saved = localStorage.getItem('smj_nfl_overlay_state_v16');
  if(saved){
    try { state = { ...state, ...JSON.parse(saved) }; } catch(e){}
  }
}

function logoURL(k){
  return `https://a.espncdn.com/i/teamlogos/nfl/500/${k}.png`;
}

function initials(name){
  if(!name || name === "Sold") return "";
  const cleaned = name.trim().split(/\s+/).filter(Boolean);
  if(cleaned.length === 1) return cleaned[0].slice(0,3).toUpperCase();
  return cleaned.slice(0,2).map(x => x[0].toUpperCase()).join('');
}

function buildAssignmentTicker(){
  const entries = TEAM_DATA
    .filter(([k]) => state.soldTeams[k])
    .map(([k, label]) => `${label}: ${state.soldTeams[k]}`);
  if(entries.length === 0){
    return "No team assignments yet • click a team to mark sold •";
  }
  return entries.join(" • ");
}

function updateTop(){
  document.getElementById("title").textContent = state.title;
  document.getElementById("soldCount").innerText = Object.keys(state.soldTeams).length;
}

function updateTicker(){
  const el = document.getElementById("tickerText");
  el.textContent = state.tickerMode === "assignments" ? buildAssignmentTicker() : state.defaultTicker;
}

function renderTeams(){
  const grid = document.getElementById("teamsGrid");
  grid.innerHTML = "";
  TEAM_DATA.forEach(([k,label])=>{
    const d = document.createElement("div");
    d.className = "team-chip" + (state.soldTeams[k] ? " sold" : "");
    d.title = state.soldTeams[k] ? `${label} — ${state.soldTeams[k]}` : `${label} — Available`;

    const img = document.createElement("img");
    img.src = logoURL(k);
    img.alt = label;
    d.appendChild(img);

    if(state.soldTeams[k] && state.soldTeams[k] !== "Sold"){
      const badge = document.createElement("div");
      badge.className = "team-initials";
      badge.textContent = initials(state.soldTeams[k]);
      d.appendChild(badge);
    }

    d.onclick = () => toggleSold(k);
    grid.appendChild(d);
  });

  updateTop();
  updateTicker();
}

function populateDropdown(){
  const dd = document.getElementById("teamDropdown");
  dd.innerHTML = "";
  TEAM_DATA.forEach(([k,label])=>{
    const opt = document.createElement("option");
    opt.value = k;
    opt.textContent = label;
    dd.appendChild(opt);
  });
}

function toggleSold(k){
  if(state.soldTeams[k]) delete state.soldTeams[k];
  else state.soldTeams[k] = "Sold";
  saveState();
  renderTeams();
}

function assignBuyer(){
  const team = document.getElementById("teamDropdown").value;
  const buyer = document.getElementById("buyerInput").value.trim();
  if(!buyer) return;
  state.soldTeams[team] = buyer;
  saveState();
  renderTeams();
  document.getElementById("buyerInput").value = "";
}

function setTitle(){
  const v = document.getElementById("titleInput").value.trim();
  if(!v) return;
  state.title = v.toUpperCase();
  saveState();
  updateTop();
}

function setTicker(){
  const v = document.getElementById("tickerInput").value.trim();
  if(!v) return;
  state.defaultTicker = v;
  state.tickerMode = "default";
  saveState();
  updateTicker();
}

function toggleAssignmentTicker(){
  state.tickerMode = state.tickerMode === "assignments" ? "default" : "assignments";
  saveState();
  updateTicker();
}

document.addEventListener('keydown', e => {
  if(e.key.toLowerCase() === "h"){
    document.getElementById("controls").classList.toggle("show");
  }
});

loadState();
populateDropdown();
updateTop();
updateTicker();
renderTeams();

document.getElementById("titleInput").value = state.title;
</script>

</body>
</html>
