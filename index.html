
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, initial-scale=1.0" />
<title>SMJ Whatnot Top Overlay</title>
<style>
:root{
  --bg1: rgba(5,10,22,.96);
  --bg2: rgba(7,18,38,.94);
  --line: rgba(255,255,255,.12);
  --text:#f5f7fb;
  --muted:#b8c2d9;
  --accent:#61b8ff;
}
html,body{
  margin:0;padding:0;width:1080px;height:720px;overflow:hidden;
  font-family:Montserrat,Arial,sans-serif;background:transparent;color:var(--text);
}
.overlay{
  width:1080px;height:720px;
  display:grid;
  grid-template-rows:90px 1fr 48px;
  gap:6px;padding:6px;box-sizing:border-box;
}
.header,.team-wrap,.ticker{
  background:linear-gradient(180deg,var(--bg2),var(--bg1));
  border-radius:16px;border:1px solid var(--line);
  overflow:hidden;
}
.header{
  display:grid;
  grid-template-columns:90px 1fr 210px;
  align-items:center;
  padding:8px 14px;
}
.logo img{width:70px;height:70px;object-fit:contain;display:block;}
#title{
  position:relative;
  overflow:hidden;
  font-size:34px;font-weight:1000;text-align:center;
}
#title span{
  display:inline-block;
  white-space:nowrap;
  padding-left:100%;
  animation:titleScroll 12s linear infinite;
}
@keyframes titleScroll{
  from{transform:translateX(0)}
  to{transform:translateX(-100%)}
}
}
.counter-wrap{display:flex;justify-content:flex-end;}
.counter{
  min-width:170px;
  text-align:center;
  padding:8px 10px;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
}
.counter .label{
  font-size:11px;font-weight:800;letter-spacing:1px;color:var(--muted);
}
.counter .value{
  margin-top:2px;font-size:30px;font-weight:1000;line-height:1;
}
.counter.bump .value{animation:counterPop .35s ease-out;}
@keyframes counterPop{
  0%{transform:scale(.82);}
  60%{transform:scale(1.12);}
  100%{transform:scale(1);}
}

.team-wrap{padding:8px;box-sizing:border-box;}
.teams-grid{
  height:100%;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:6px;
}
.team{
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.05);
  border-radius:10px;border:1px solid rgba(255,255,255,.08);
  cursor:pointer;position:relative;overflow:hidden;
}
.team img{
  width:72%;height:72%;object-fit:contain;display:block;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.28));
}
.team.sold img{
  filter:grayscale(100%) brightness(.45);
  opacity:.75;
}
.team.sold::after{
  content:"✕";
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-56%);
  font-size:40px;font-weight:1000;color:red;
  text-shadow:0 0 12px rgba(255,0,0,.88);
  pointer-events:none;
}
.team.flash{animation:tileFlash .4s ease-out;}
@keyframes tileFlash{
  0%{box-shadow:0 0 0 rgba(97,184,255,0);}
  50%{box-shadow:0 0 18px rgba(97,184,255,.55);}
  100%{box-shadow:0 0 0 rgba(97,184,255,0);}
}
.team-code{
  position:absolute;top:4px;left:6px;
  font-size:11px;font-weight:900;letter-spacing:.4px;
  text-shadow:0 1px 3px rgba(0,0,0,.55);
}
.team-initials{
  position:absolute;
  bottom:4px;left:50%;
  transform:translateX(-50%);
  font-size:11px;font-weight:900;
  color:var(--text);
  background:rgba(4,10,22,.88);
  border:1px solid rgba(255,255,255,.12);
  border-radius:999px;
  padding:2px 7px;
  max-width:88%;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.ticker{
  display:flex;align-items:center;overflow:hidden;padding:8px 12px;box-sizing:border-box;
}
.ticker-label{
  flex:0 0 auto;
  margin-right:10px;
  font-size:12px;font-weight:900;letter-spacing:1px;color:var(--muted);
}
.ticker-track{min-width:0;overflow:hidden;width:100%;}
#tickerText{
  white-space:nowrap;
  display:inline-block;
  padding-left:100%;
  animation:ticker 24s linear infinite;
  font-size:18px;font-weight:900;
}
@keyframes ticker{
  from{transform:translateX(0)}
  to{transform:translateX(-100%)}
}

.controls{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  width:920px;max-height:500px;overflow:auto;z-index:999;
  background:rgba(4,10,22,.985);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;box-shadow:0 22px 50px rgba(0,0,0,.5);
  padding:16px;display:none;box-sizing:border-box;
}
.controls.show{display:block;}
.controls h3{margin:0 0 10px;font-size:20px;font-weight:1000;}
.control-group{
  margin-bottom:12px;padding:12px;border-radius:14px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
}
.control-group label{
  display:block;margin-bottom:7px;font-size:12px;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;
}
.row{display:flex;gap:8px;flex-wrap:wrap;}
select,input,button{font:inherit;}
select,input{
  width:100%;border:1px solid rgba(255,255,255,.11);
  background:rgba(255,255,255,.06);color:var(--text);
  border-radius:12px;padding:10px 12px;box-sizing:border-box;
}
button{
  border:0;border-radius:12px;padding:10px 14px;color:white;cursor:pointer;
  background:linear-gradient(90deg,#61b8ff,#1d58d8);font-weight:900;
}
button.secondary{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);
}
button.good{
  background:linear-gradient(90deg,#2bb673,#43d17a);
}
.half{flex:1 1 0;min-width:0;}
.third{flex:1 1 0;min-width:0;}
</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
<div class="overlay">
  <div class="header">
    <div class="logo"><img src="Logo Master.png" alt="SMJ Logo"></div>
    <div id="title"><span>NFL BREAK NIGHT</span></div>
    <div class="counter-wrap">
      <div class="counter" id="counterBox">
        <div class="label">TEAMS SOLD</div>
        <div class="value"><span id="soldCount">0</span>/32</div>
      </div>
    </div>
  </div>

  <div class="team-wrap">
    <div class="teams-grid" id="grid"></div>
  </div>

  <div class="ticker">
    <div class="ticker-label">LIVE</div>
    <div class="ticker-track">
      <div id="tickerText">Welcome to SMJ Sports Cards & Collectibles!</div>
    </div>
  </div>

  <div class="controls" id="controls">
    <h3>Overlay Controls</h3>

    <div class="control-group">
      <label>Overlay Title</label>
      <div class="row">
        <input id="titleInput" class="half" placeholder="NFL Break Night">
        <button onclick="setTitle()">Set Title</button>
      </div>
    </div>

    <div class="control-group">
      <label>Assign Buyer + Base Cards</label>
      <div class="row">
        <select id="teamDropdown" class="third"></select>
        <input id="buyerInput" class="third" placeholder="Buyer name">
        <select id="baseDropdown" class="third">
          <option value="Yes">Base Cards: Yes</option>
          <option value="No">Base Cards: No</option>
        </select>
      </div>
      <div class="row" style="margin-top:8px;">
        <button class="good half" onclick="assignBuyer()">Assign</button>
        <button class="secondary half" onclick="clearSelectedTeam()">Clear Selected Team</button>
      </div>
    </div>

    <div class="control-group">
      <label>Ticker</label>
      <div class="row">
        <input id="tickerInput" class="half" placeholder="Custom ticker text">
        <button onclick="setTicker()">Set Custom</button>
        <button class="secondary" onclick="toggleAssignmentTicker()">Toggle Assignment Ticker</button>
      </div>
    </div>

    <div class="control-group">
      <label>Spreadsheet Export</label>
      <div class="row">
        <button class="good half" onclick="downloadAssignmentsCSV()">Download Assignment CSV</button>
      </div>
    </div>
  </div>
</div>

<script>
const TEAM_DATA = [
  ['ari','ARI'],['atl','ATL'],['bal','BAL'],['buf','BUF'],['car','CAR'],['chi','CHI'],['cin','CIN'],['cle','CLE'],
  ['dal','DAL'],['den','DEN'],['det','DET'],['gb','GB'],['hou','HOU'],['ind','IND'],['jax','JAX'],['kc','KC'],
  ['lv','LV'],['lac','LAC'],['lar','LAR'],['mia','MIA'],['min','MIN'],['ne','NE'],['no','NO'],['nyg','NYG'],
  ['nyj','NYJ'],['phi','PHI'],['pit','PIT'],['sea','SEA'],['sf','SF'],['tb','TB'],['ten','TEN'],['was','WAS']
];

let state = {
  title: "NFL BREAK NIGHT",
  soldTeams: {},
  tickerMode: "assignments",
  defaultTicker: "Click teams in OBS Interact mode • press H for controls •"
};

function saveState(){
  localStorage.setItem('smj_nfl_overlay_top720_v2', JSON.stringify(state));
}
function loadState(){
  const saved = localStorage.getItem('smj_nfl_overlay_top720_v2');
  if(saved){
    try { state = { ...state, ...JSON.parse(saved) }; } catch(e){}
  }
}
function logo(t){ return `https://a.espncdn.com/i/teamlogos/nfl/500/${t}.png`; }
function initials(name){
  if(!name) return "";
  const cleaned = name.trim().split(/\s+/).filter(Boolean);
  if(cleaned.length === 1) return cleaned[0].slice(0,3).toUpperCase();
  return cleaned.slice(0,2).map(x => x[0].toUpperCase()).join('');
}
function teamLabel(key){
  const found = TEAM_DATA.find(([k]) => k === key);
  return found ? found[1] : key.toUpperCase();
}
function buildAssignmentTicker(){
  
const entries = TEAM_DATA
    .filter(([k]) => state.soldTeams[k])
    .map(([k,label]) => {
      const info = state.soldTeams[k];
      const buyer = typeof info === "string" ? info : info.buyer;
      return `${label}: ${buyer}`;
    });
  if(entries.length === 0) return "Welcome to SMJ Sports Cards & Collectibles!";
  return entries.join(" • ");

}
function updateTicker(){
  document.getElementById("tickerText").textContent =
    state.tickerMode === "assignments" ? buildAssignmentTicker() : state.defaultTicker;
}
function bumpCounter(){
  const box = document.getElementById("counterBox");
  box.classList.remove("bump");
  void box.offsetWidth;
  box.classList.add("bump");
}
function updateTop(){
  document.querySelector("#title span").textContent = state.title;
  document.getElementById("soldCount").innerText = Object.keys(state.soldTeams).length;
}
function render(){
  const g = document.getElementById("grid");
  g.innerHTML = "";
  TEAM_DATA.forEach(([k,label]) => {
    const info = state.soldTeams[k];
    const buyer = !info ? "" : (typeof info === "string" ? info : info.buyer);
    const d = document.createElement("div");
    d.className = "team" + (info ? " sold" : "");
    d.title = info
      ? `${label} — ${buyer}${typeof info === "string" ? "" : " — Base: " + info.baseCards}`
      : `${label} — Available`;

    const code = document.createElement("div");
    code.className = "team-code";
    code.textContent = label;
    d.appendChild(code);

    const img = document.createElement("img");
    img.src = logo(k);
    img.alt = label;
    d.appendChild(img);

    if(buyer && buyer !== "Sold"){
      const badge = document.createElement("div");
      badge.className = "team-initials";
      badge.textContent = initials(buyer);
      d.appendChild(badge);
    }

    d.onclick = () => toggle(k);
    g.appendChild(d);
  });
  updateTop();
  updateTicker();
}
function flashTeam(k){
  const idx = TEAM_DATA.findIndex(([key]) => key === k);
  const el = document.getElementById("grid").children[idx];
  if(!el) return;
  el.classList.remove("flash");
  void el.offsetWidth;
  el.classList.add("flash");
}
function toggle(k){
  if(state.soldTeams[k]) delete state.soldTeams[k];
  else state.soldTeams[k] = { buyer: "Sold", baseCards: "Yes" };
  saveState();
  render();
  bumpCounter();
  flashTeam(k);
}
function populateDropdown(){
  const dd = document.getElementById("teamDropdown");
  dd.innerHTML = "";
  TEAM_DATA.forEach(([k,label]) => {
    const opt = document.createElement("option");
    opt.value = k;
    opt.textContent = label;
    dd.appendChild(opt);
  });
}
function assignBuyer(){
  const team = document.getElementById("teamDropdown").value;
  const buyer = document.getElementById("buyerInput").value.trim();
  const baseCards = document.getElementById("baseDropdown").value;
  if(!buyer) return;
  state.soldTeams[team] = { buyer, baseCards };
  saveState();
  render();
  bumpCounter();
  flashTeam(team);
  document.getElementById("buyerInput").value = "";
}
function clearSelectedTeam(){
  const team = document.getElementById("teamDropdown").value;
  if(!team) return;
  delete state.soldTeams[team];
  saveState();
  render();
}
function setTitle(){
  const v = document.getElementById("titleInput").value.trim();
  if(!v) return;
  state.title = v.toUpperCase();
  saveState();
  updateTop();
}
function setTicker(){
  const v = document.getElementById("tickerInput").value.trim();
  if(!v) return;
  state.defaultTicker = v;
  state.tickerMode = "default";
  saveState();
  updateTicker();
}
function toggleAssignmentTicker(){
  state.tickerMode = state.tickerMode === "assignments" ? "default" : "assignments";
  saveState();
  updateTicker();
}

function downloadAssignmentsCSV(){
  const rows = [];
  rows.push([state.title]); // First row = break title
  rows.push([]);

  const headers = ["Team Code","Buyer Name","Buyer Initials","Wants Base Cards"];
  rows.push(headers);

  TEAM_DATA
    .filter(([k]) => state.soldTeams[k])
    .forEach(([k,label]) => {
      const info = state.soldTeams[k];
      const buyer = typeof info === "string" ? info : info.buyer;
      const baseCards = typeof info === "string" ? "Yes" : info.baseCards;
      rows.push([label, buyer, initials(buyer), baseCards]);
    });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Assignments");

  const safeTitle = (state.title || "break")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_|_$/g,"");

  XLSX.writeFile(wb, safeTitle + "_assignments.xlsx");
}

document.addEventListener("keydown", e => {
  if(e.key.toLowerCase() === "h"){
    document.getElementById("controls").classList.toggle("show");
  }
});
loadState();
populateDropdown();
render();
updateTop();
updateTicker();
document.getElementById("titleInput").value = state.title;
</script>
</body>
</html>
