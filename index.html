<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, initial-scale=1.0" />
<title>SMJ Overlay</title>

<style>
:root{
  --bg1: rgba(5,10,22,.96);
  --bg2: rgba(7,18,38,.94);
  --line: rgba(255,255,255,.12);
  --text:#f5f7fb;
  --muted:#b8c2d9;
}

html,body{
  margin:0;
  padding:0;
  width:1080px;
  height:720px;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:transparent;
  color:var(--text);
}

.overlay{
  width:1080px;
  height:720px;
  display:grid;
  grid-template-rows:90px 1fr 48px;
  gap:6px;
  padding:6px;
  box-sizing:border-box;
  position:relative;
}

/* 🔥 BACKGROUND LOGO */
.overlay::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("Logo Master.png") center center no-repeat;
  background-size:65%;
  opacity:0.06;
  filter:blur(2px);
  pointer-events:none;
  z-index:0;
}

.overlay > *{
  position:relative;
  z-index:1;
}

.header,.team-wrap,.ticker{
  background:linear-gradient(180deg,var(--bg2),var(--bg1));
  border-radius:16px;
  border:1px solid var(--line);
  overflow:hidden;
}

.header{
  display:grid;
  grid-template-columns:1fr 210px;
  align-items:center;
  padding:8px 14px;
}

#title{
  text-align:center;
  font-size:34px;
  font-weight:1000;
}

.counter{
  text-align:center;
}

.counter .value{
  font-size:30px;
  font-weight:bold;
}

.team-wrap{
  padding:8px;
}

.teams-grid{
  height:100%;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:6px;
}

.team{
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.05);
  border-radius:10px;
  position:relative;
}

.team img{
  width:70%;
}

.team.sold img{
  filter:grayscale(100%);
  opacity:.6;
}

.team.just-sold{
  animation:flash .5s ease-out;
}

@keyframes flash{
  0%{transform:scale(.9);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

.team-username{
  position:absolute;
  bottom:4px;
  font-size:10px;
  background:black;
  padding:2px 6px;
  border-radius:8px;
}

.ticker{
  display:flex;
  align-items:center;
  padding:8px;
}

#tickerText{
  white-space:nowrap;
  animation:ticker 25s linear infinite;
}

@keyframes ticker{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* 🎬 RECAP SPLASH */
.recap{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:50px;
  font-weight:bold;
}

.recap.show{
  display:flex;
  animation:fade .6s;
}

@keyframes fade{
  from{opacity:0}
  to{opacity:1}
}
</style>
</head>

<body>

<div class="overlay">

  <div class="header">
    <div id="title">NFL BREAK NIGHT</div>
    <div class="counter">
      <div class="value" id="count">0/32</div>
    </div>
  </div>

  <div class="team-wrap">
    <div class="teams-grid" id="grid"></div>
  </div>

  <div class="ticker">
    <div id="tickerText">Welcome to SMJ Sports Cards & Collectibles!</div>
  </div>

  <div class="recap" id="recap">RECAP MODE</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const config = {
  apiKey:"PASTE",
  databaseURL:"PASTE"
};

const app = initializeApp(config);
const db = getDatabase(app);

const teams = [
'ari','atl','bal','buf','car','chi','cin','cle',
'dal','den','det','gb','hou','ind','jax','kc',
'lv','lac','lar','mia','min','ne','no','nyg',
'nyj','phi','pit','sea','sf','tb','ten','was'
];

let prev = {};

function render(data){
  const g = document.getElementById("grid");
  g.innerHTML="";

  let count = 0;

  teams.forEach(t=>{
    const d = document.createElement("div");
    const sold = data?.[t];

    d.className = "team" + (sold?" sold":"");

    if(sold && !prev[t]){
      d.classList.add("just-sold");
    }

    const img = document.createElement("img");
    img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${t}.png`;

    d.appendChild(img);

    if(sold){
      count++;
      const u = document.createElement("div");
      u.className="team-username";
      u.innerText = sold.buyer;
      d.appendChild(u);
    }

    g.appendChild(d);
  });

  document.getElementById("count").innerText = count + "/32";

  prev = {...data};
}

onValue(ref(db,"overlayState/main"), snap=>{
  const s = snap.val() || {};

  document.getElementById("title").innerText = s.title || "BREAK";

  render(s.soldTeams);

  document.getElementById("recap").classList.toggle("show", s.recapMode);
});
</script>

</body>
</html>
