
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, initial-scale=1.0" />
<title>SMJ Break Board</title>
<style>
:root{
  --bg:#060b14;
  --panel:#0b1322;
  --panel2:#101a2c;
  --line:rgba(255,255,255,.18);
  --text:#f5f7fb;
  --muted:#c6d0e4;
  --red1:#e53935;
  --red2:#9e1414;
}
html,body{
  margin:0;
  padding:0;
  width:1080px;
  height:360px;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:transparent;
  color:var(--text);
}
.overlay{
  width:1080px;
  height:360px;
  box-sizing:border-box;
  padding:4px;
  display:grid;
  grid-template-rows:42px 1fr 28px;
  gap:2px;
  position:relative;
}
.bar{
  background:linear-gradient(180deg,rgba(15,22,36,.94),rgba(5,8,14,.96));
  border:1px solid rgba(255,255,255,.16);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  overflow:hidden;
}
.title-bar{
  display:grid;
  grid-template-columns: 1fr 170px;
  align-items:center;
  padding:0 12px;
}
#title{
  text-align:center;
  font-weight:1000;
  font-size:28px;
  letter-spacing:.7px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.alive-box{
  display:grid;
  grid-template-columns: 1fr auto;
  align-items:center;
  gap:10px;
  background:linear-gradient(180deg, rgba(229,57,53,.95), rgba(158,20,20,.95));
  border:1px solid rgba(255,255,255,.18);
  border-radius:4px;
  padding:4px 10px;
}
.alive-label{
  font-size:10px;
  font-weight:1000;
  text-transform:uppercase;
  letter-spacing:.8px;
}
.alive-value{
  font-size:18px;
  font-weight:1000;
}
.board{
  position:relative;
  padding:2px;
  display:grid;
  grid-template-rows: repeat(4, minmax(0, 1fr));
  gap:2px;
  background:
    radial-gradient(circle at center, rgba(255,255,255,.06), transparent 38%),
    linear-gradient(180deg,rgba(12,17,28,.95),rgba(4,6,10,.98));
}
.board::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("./logo.png") center center no-repeat;
  background-size:30%;
  opacity:.08;
  pointer-events:none;
}
.team-row{
  display:grid;
  gap:2px;
  position:relative;
  z-index:1;
}
.team-row.full{
  grid-template-columns: repeat(8, 1fr);
}
.team-row.middle{
  grid-template-columns: repeat(4, 1fr) 240px repeat(4, 1fr);
}
.center-logo{
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(180deg, rgba(10,15,24,.92), rgba(4,6,10,.95));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 8px 20px rgba(0,0,0,.22);
}
.center-logo img{
  width:60%;
  height:60%;
  object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.28));
}
.team{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#05080f;
  border:1px solid rgba(255,255,255,.18);
  overflow:hidden;
  padding:2px;
  box-shadow: inset 0 0 6px rgba(255,255,255,.05);
}
.team img{
  width:60%;
  height:60%;
  object-fit:contain;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.24));
}
.team.sold img{
  filter:grayscale(100%) brightness(.5);
  opacity:.75;
}
.team.sold::after{
  content:"✕";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-56%);
  font-size:28px;
  font-weight:1000;
  color:#ff2f2f;
  text-shadow:0 0 12px rgba(255,0,0,.85);
  pointer-events:none;
}
.team.just-sold{
  animation:soldPop .45s ease-out;
}
@keyframes soldPop{
  0%{transform:scale(.92)}
  55%{transform:scale(1.06)}
  100%{transform:scale(1)}
}
.team-code{
  position:absolute;
  top:2px;
  left:4px;
  font-size:8px;
  font-weight:1000;
  color:var(--muted);
  letter-spacing:.4px;
}
.team-username{
  position:absolute;
  bottom:2px;
  left:50%;
  transform:translateX(-50%);
  max-width:92%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:7px;
  font-weight:1000;
  background:rgba(0,0,0,.84);
  color:#fff;
  padding:1px 4px;
  border-radius:4px;
  border:1px solid rgba(255,255,255,.08);
}
.chaser-badges{
  position:absolute;
  top:2px;
  right:2px;
  display:flex;
  gap:2px;
  flex-wrap:wrap;
  justify-content:flex-end;
  max-width:34px;
}
.chaser-badge{
  min-width:13px;
  height:13px;
  padding:0 3px;
  border-radius:999px;
  background:linear-gradient(180deg,#61b8ff,#1d58d8);
  color:#fff;
  font-size:7px;
  font-weight:1000;
  line-height:13px;
  text-align:center;
  box-shadow:0 1px 4px rgba(0,0,0,.28);
}
.ticker{
  display:grid;
  grid-template-columns: 1fr 175px;
  align-items:center;
  padding:0 8px;
}
.bottom-note{
  display:grid;
  grid-template-columns: auto auto;
  align-items:center;
  gap:8px;
}
.live-pill{
  color:#fff;
  font-size:10px;
  font-weight:1000;
  letter-spacing:.8px;
  text-transform:uppercase;
}
#tickerText{
  white-space:nowrap;
  display:inline-block;
  animation:ticker 24s linear infinite;
  font-size:11px;
  font-weight:1000;
}
@keyframes ticker{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}
.recap{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10;
  pointer-events:none;
}
.recap.show{
  display:flex;
  animation:fade .45s;
}
.recap-card{
  padding:16px 24px;
  border-radius:16px;
  background:linear-gradient(180deg, rgba(15,30,58,.97), rgba(7,18,38,.97));
  border:1px solid rgba(255,255,255,.16);
  box-shadow:0 18px 40px rgba(0,0,0,.38);
  font-size:32px;
  font-weight:1000;
  letter-spacing:1px;
}
@keyframes fade{
  from{opacity:0; transform:translateY(-14px) scale(.96)}
  to{opacity:1; transform:translateY(0) scale(1)}
}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="bar title-bar">
    <div id="title">BREAK</div>
    <div class="alive-box">
      <div class="alive-label">Teams Alive</div>
      <div class="alive-value" id="count">32</div>
    </div>
  </div>

  <div class="bar board">
    <div class="team-row full" id="row1"></div>
    <div class="team-row middle" id="row2"></div>
    <div class="team-row middle" id="row3"></div>
    <div class="team-row full" id="row4"></div>
  </div>

  <div class="bar ticker">
    <div class="bottom-note">
      <div class="live-pill">LIVE</div>
      <div id="tickerText">Welcome to SMJ Sports Cards & Collectibles!</div>
    </div>
    <div></div>
  </div>

  <div class="recap" id="recap">
    <div class="recap-card">RECAP MODE</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAP5JIYtql-4YB-wAgNT2Urja4DUOFoRws",
  authDomain: "smj-overlay.firebaseapp.com",
  databaseURL: "https://smj-overlay-default-rtdb.firebaseio.com",
  projectId: "smj-overlay",
  storageBucket: "smj-overlay.firebasestorage.app",
  messagingSenderId: "1034121319902",
  appId: "1:1034121319902:web:2b88ce1cc3ccf79766794f",
  measurementId: "G-511F87E4GE"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const BOARD_ROWS = {
  row1: ['lv','lac','lar','no','nyg','cle','jax','chi'],
  row2: ['nyj','phi','pit','mia', 'CENTER', 'ind','hou','atl'],
  row3: ['min','ne','sf','sea', 'CENTER', 'bal','dal','det'],
  row4: ['tb','ten','was','kc','cin','buf','den','gb']
};

let prevSold = {};
let lastRecapMode = false;
let recapTimer = null;

function buildTicker(soldTeams){
  const all = Object.entries(soldTeams || {}).map(([key, info]) => {
    const label = key.toUpperCase();
    const buyer = typeof info === "string" ? info : info.buyer;
    return `${label}: ${buyer}`;
  });
  const welcome = "Welcome to SMJ Sports Cards & Collectibles!";
  return all.length ? all.join(" • ") + " • " + welcome : welcome;
}

function showRecapSplash(){
  const recap = document.getElementById("recap");
  recap.classList.remove("show");
  void recap.offsetWidth;
  recap.classList.add("show");
  if (recapTimer) clearTimeout(recapTimer);
  recapTimer = setTimeout(() => recap.classList.remove("show"), 1400);
}

function fitTitle(text){
  const el = document.getElementById("title");
  el.textContent = text || "BREAK";
  let size = 28;
  el.style.fontSize = size + "px";
  while (el.scrollWidth > el.clientWidth && size > 18) {
    size -= 1;
    el.style.fontSize = size + "px";
  }
}

function getChaserMap(chasers){
  const map = {};
  Object.entries(chasers || {}).forEach(([spot, info]) => {
    if (!info || !info.team) return;
    const key = info.team.toLowerCase();
    if (!map[key]) map[key] = [];
    map[key].push(spot);
  });
  return map;
}

function makeTeamCell(teamKey, soldTeams, chasers){
  const wrap = document.createElement("div");
  if (teamKey === 'CENTER') {
    wrap.className = "center-logo";
    wrap.innerHTML = '<img src="./logo.png" alt="SMJ Logo">';
    return wrap;
  }

  const label = teamKey.toUpperCase();
  const soldInfo = soldTeams?.[teamKey];
  const chaserMap = getChaserMap(chasers);
  const chaserAssigned = !!(chaserMap[label.toLowerCase()]?.length);
  const buyer = soldInfo ? (typeof soldInfo === "string" ? soldInfo : soldInfo.buyer) : "";

  wrap.className = "team" + ((soldInfo || chaserAssigned) ? " sold" : "");
  if (soldInfo && !prevSold[teamKey]) wrap.classList.add("just-sold");

  const code = document.createElement("div");
  code.className = "team-code";
  code.textContent = label;
  wrap.appendChild(code);

  const img = document.createElement("img");
  img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${teamKey}.png`;
  img.alt = label;
  wrap.appendChild(img);

  const badges = chaserMap[label.toLowerCase()] || [];
  if (badges.length) {
    const badgeWrap = document.createElement("div");
    badgeWrap.className = "chaser-badges";
    badges.forEach(spot => {
      const badge = document.createElement("div");
      badge.className = "chaser-badge";
      badge.textContent = spot;
      badgeWrap.appendChild(badge);
    });
    wrap.appendChild(badgeWrap);
  }

  if (buyer) {
    const tag = document.createElement("div");
    tag.className = "team-username";
    tag.textContent = buyer;
    wrap.appendChild(tag);
  }

  return wrap;
}

function renderBoard(soldTeams, chasers){
  let assignedCount = 0;
  const chaserMap = getChaserMap(chasers);

  Object.entries(BOARD_ROWS).forEach(([rowId, teams]) => {
    const rowEl = document.getElementById(rowId);
    rowEl.innerHTML = "";
    teams.forEach(teamKey => {
      rowEl.appendChild(makeTeamCell(teamKey, soldTeams, chasers));
      if (teamKey !== "CENTER") {
        const soldInfo = soldTeams?.[teamKey];
        const label = teamKey.toUpperCase();
        const chaserAssigned = !!(chaserMap[label.toLowerCase()]?.length);
        if (soldInfo || chaserAssigned) assignedCount += 1;
      }
    });
  });

  document.getElementById("count").textContent = String(32 - assignedCount);
  prevSold = { ...(soldTeams || {}) };
}

onValue(ref(db, "overlayState/main"), snap => {
  const s = snap.val() || {};
  const soldTeams = s.soldTeams || {};
  const chasers = s.chasers || {};

  fitTitle(s.title || "BREAK");
  renderBoard(soldTeams, chasers);

  document.getElementById("tickerText").textContent =
    s.tickerMode === "default"
      ? (s.defaultTicker || "Welcome to SMJ Sports Cards & Collectibles!")
      : buildTicker(soldTeams);

  if (s.recapMode && !lastRecapMode) showRecapSplash();
  lastRecapMode = !!s.recapMode;
});
</script>
</body>
</html>
